name: ci

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - name: Start test dependencies
        run: |
          cp .env.example .env
          docker compose -f docker/docker-compose.yml pull -q postgres redis minio
          docker compose -f docker/docker-compose.yml up -d postgres redis minio
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          enable-cache: true
          working-directory: backend
      - name: Install backend dependencies
        working-directory: backend
        run: uv sync --frozen --extra dev
      - name: Lint backend
        working-directory: backend
        run: uv run --frozen ruff check .
      - name: Wait for test dependencies
        run: docker compose -f docker/docker-compose.yml up -d --wait postgres redis minio
      - name: Test backend
        working-directory: backend
        run: uv run --frozen pytest
      - name: Show dependency logs on failure
        if: failure()
        run: docker compose -f docker/docker-compose.yml logs postgres redis minio
      - name: Stop test dependencies
        if: always()
        run: docker compose -f docker/docker-compose.yml down -v

  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: frontend/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('frontend/package-lock.json') }}-${{ hashFiles('frontend/src/**') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('frontend/package-lock.json') }}-
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
      - run: npm run build
        env:
          NEXT_PUBLIC_API_URL: /api/v1

  # Validates compose files in parallel with backend/frontend — cheap, catches config errors fast
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v3
      - name: Validate Compose files
        run: |
          docker compose -f docker/docker-compose.yml --env-file .env.example config -q
          docker compose -f docker/docker-compose.prod.yml config -q --no-interpolate

  # Docker build + push only runs on push to main (skipped on PRs entirely)
  containers:
    needs: [backend, frontend, validate]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v3
      - name: Prepare build environment
        run: |
          cp .env.example .env
          # Satisfy :? required vars that are intentionally blank in the example
          echo "TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN || 'ci-placeholder' }}" >> .env
          echo "TELEGRAM_BOT_USERNAME=${{ secrets.TELEGRAM_BOT_USERNAME || 'ci-placeholder' }}" >> .env
          echo "CADDY_DOMAIN=${{ secrets.CADDY_DOMAIN || 'ci.example.com' }}" >> .env
          echo "REGISTRY_OWNER=anxchywl" >> .env
          echo "ADMIN_TELEGRAM_IDS=${{ secrets.ADMIN_TELEGRAM_IDS || '[]' }}" >> .env
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push production images
        uses: docker/bake-action@v6
        with:
          files: docker/docker-compose.prod.yml
          targets: |
            api
            web
            backup
          push: true
          set: |
            *.cache-from=type=gha
            *.cache-to=type=gha,mode=max
            api.tags=ghcr.io/anxchywl/loci-api:latest
            web.tags=ghcr.io/anxchywl/loci-web:latest
            backup.tags=ghcr.io/anxchywl/loci-backup:latest

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [containers]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Deploy to production server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail
            REPO="${{ secrets.SSH_PATH }}"
            if [ ! -d "$REPO/.git" ]; then
              mkdir -p "$(dirname "$REPO")"
              git clone https://github.com/anxchywl/loci.git "$REPO"
            fi
            cd "$REPO"
            git fetch origin main
            git reset --hard origin/main
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
            docker compose -f docker/docker-compose.prod.yml pull
            docker compose -f docker/docker-compose.prod.yml up -d --remove-orphans --wait
