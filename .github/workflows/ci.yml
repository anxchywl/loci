name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          enable-cache: true
          working-directory: backend

      - name: Start backend test dependencies
        run: |
          cp .env.example .env
          docker compose -f docker/docker-compose.yml pull -q postgres redis minio
          docker compose -f docker/docker-compose.yml up -d postgres redis minio

      - name: Install backend dependencies
        working-directory: backend
        run: uv sync --frozen --extra dev

      - name: Lint backend
        working-directory: backend
        run: uv run --frozen ruff check .

      - name: Wait for backend test dependencies
        run: docker compose -f docker/docker-compose.yml up -d --wait postgres redis minio

      - name: Test backend
        working-directory: backend
        run: uv run --frozen pytest

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Typecheck frontend
        working-directory: frontend
        run: npm run typecheck

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Test frontend
        working-directory: frontend
        run: npm test

      - name: Build frontend
        working-directory: frontend
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: /api/v1

      - name: Show dependency logs on failure
        if: failure()
        run: docker compose -f docker/docker-compose.yml logs postgres redis minio

      - name: Stop backend test dependencies
        if: always()
        run: docker compose -f docker/docker-compose.yml down -v

  migration-safety:
    name: Migration Safety Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          enable-cache: true
          working-directory: backend

      - name: Prepare migration environment
        run: |
          cp .env.example .env
          echo "TELEGRAM_BOT_TOKEN=ci-placeholder" >> .env
          echo "ADMIN_TELEGRAM_IDS=[]" >> .env

      - name: Install backend dependencies
        working-directory: backend
        run: uv sync --frozen --extra dev

      - name: Validate migration SQL
        working-directory: backend
        run: uv run --frozen alembic upgrade head --sql > /dev/null

      - name: Validate Compose files
        run: |
          docker compose -f docker/docker-compose.yml --env-file .env.example config -q
          docker compose -f docker/docker-compose.prod.yml config -q --no-interpolate

  docker-build:
    name: Docker Build
    needs: [lint-and-test, migration-safety]
    runs-on: ubuntu-latest
    timeout-minutes: 25

    env:
      REGISTRY_OWNER: anxchywl

    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v3

      - name: Prepare build environment
        run: |
          cp .env.example .env
          echo "TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN || 'ci-placeholder' }}" >> .env
          echo "TELEGRAM_BOT_USERNAME=${{ secrets.TELEGRAM_BOT_USERNAME || 'ci-placeholder' }}" >> .env
          echo "CADDY_DOMAIN=${{ secrets.CADDY_DOMAIN || 'ci.example.com' }}" >> .env
          echo "ADMIN_TELEGRAM_IDS=${{ secrets.ADMIN_TELEGRAM_IDS || '[]' }}" >> .env

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build production images
        uses: docker/bake-action@v6
        with:
          files: docker/docker-compose.prod.yml
          targets: |
            api
            web
            backup
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          set: |
            *.cache-from=type=gha
            *.cache-to=type=gha,mode=max
            api.tags=ghcr.io/anxchywl/loci-api:latest
            web.tags=ghcr.io/anxchywl/loci-web:latest
            backup.tags=ghcr.io/anxchywl/loci-backup:latest

  deploy:
    name: Deploy
    needs: [lint-and-test, migration-safety, docker-build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Deploy to production server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail
            REPO="${{ secrets.SSH_PATH }}"
            if [ ! -d "$REPO/.git" ]; then
              mkdir -p "$(dirname "$REPO")"
              git clone https://github.com/anxchywl/loci.git "$REPO"
            fi
            cd "$REPO"
            git fetch origin main
            git reset --hard origin/main
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
            docker compose -f docker/docker-compose.prod.yml pull
            docker compose -f docker/docker-compose.prod.yml up -d --remove-orphans --wait
