name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          enable-cache: true
          working-directory: backend

      - name: Start backend test dependencies
        run: |
          cp .env.example .env
          docker compose -f docker/docker-compose.yml pull -q postgres redis minio
          docker compose -f docker/docker-compose.yml up -d postgres redis minio

      - name: Install backend dependencies
        working-directory: backend
        run: uv sync --frozen --extra dev

      - name: Lint backend
        working-directory: backend
        run: uv run --frozen ruff check .

      - name: Wait for backend test dependencies
        run: docker compose -f docker/docker-compose.yml up -d --wait postgres redis minio

      - name: Test backend
        working-directory: backend
        run: uv run --frozen pytest

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Typecheck frontend
        working-directory: frontend
        run: npm run typecheck

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Test frontend
        working-directory: frontend
        run: npm test

      - name: Build frontend
        working-directory: frontend
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: /api/v1

      - name: Show dependency logs on failure
        if: failure()
        run: docker compose -f docker/docker-compose.yml logs postgres redis minio

      - name: Stop backend test dependencies
        if: always()
        run: docker compose -f docker/docker-compose.yml down -v

  migration-safety:
    name: Migration Safety Check
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          enable-cache: true
          working-directory: backend

      - name: Prepare migration environment
        run: |
          cp .env.example .env
          echo "TELEGRAM_BOT_TOKEN=ci-placeholder" >> .env
          echo "ADMIN_TELEGRAM_IDS=[]" >> .env

      - name: Install backend dependencies
        working-directory: backend
        run: uv sync --frozen --extra dev

      - name: Validate migration SQL
        working-directory: backend
        run: uv run --frozen alembic upgrade head --sql > /dev/null

      - name: Validate Compose files
        run: |
          docker compose -f docker/docker-compose.yml --env-file .env.example config -q
          docker compose -f docker/docker-compose.prod.yml config -q --no-interpolate

      - name: Validate production capacity and operations
        run: |
          echo "CADDY_DOMAIN=ci.example.com" >> .env
          echo "GRAFANA_ADMIN_PASSWORD=ci-placeholder-not-for-production" >> .env
          COMPOSE_ENV_FILE="$PWD/.env" deploy/check-capacity-model.sh
          docker run --rm -v "$PWD:/mnt:ro" koalaman/shellcheck:v0.11.0 \
            /mnt/deploy/backup.sh /mnt/deploy/check-capacity-model.sh \
            /mnt/deploy/deploy.sh /mnt/deploy/preflight.sh /mnt/deploy/restore.sh \
            /mnt/deploy/setup-server.sh /mnt/deploy/verify-backup.sh
          docker run --rm -v "$PWD/docker/monitoring:/etc/prometheus:ro" \
            --entrypoint promtool prom/prometheus:v3.7.3 \
            check config /etc/prometheus/prometheus.yml
          jq -e . docker/monitoring/grafana/dashboards/loci-api.json >/dev/null
          docker run --rm -e BASE_URL=http://127.0.0.1:8000 \
            -v "$PWD/load_tests/k6:/scripts:ro" \
            grafana/k6:2.1.0 inspect /scripts/map_browse.js >/dev/null
          for script in authenticated_writes.js upload_soak.js; do
            docker run --rm -e BASE_URL=http://127.0.0.1:8000 \
              -e ALLOW_WRITES=true -e ACCESS_TOKENS=placeholder \
              -e STORY_IDS=00000000-0000-0000-0000-000000000001 \
              -v "$PWD/load_tests/k6:/scripts:ro" \
              grafana/k6:2.1.0 inspect "/scripts/$script" >/dev/null
          done

  docker-build:
    name: Docker Build
    needs: [lint-and-test, migration-safety]
    runs-on: ubuntu-latest
    timeout-minutes: 25

    env:
      REGISTRY_OWNER: anxchywl

    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v3

      - name: Prepare build environment
        env:
          ENV_FILE_CONTENT: ${{ secrets.ENV_FILE }}
        run: |
          if [ -n "$ENV_FILE_CONTENT" ]; then
            echo "$ENV_FILE_CONTENT" > .env
          else
            cp .env.example .env
            echo "TELEGRAM_BOT_TOKEN=ci-placeholder" >> .env
            echo "TELEGRAM_BOT_USERNAME=ci-placeholder" >> .env
            echo "CADDY_DOMAIN=ci.example.com" >> .env
            echo "ADMIN_TELEGRAM_IDS=[]" >> .env
          fi

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build production images
        uses: docker/bake-action@v6
        with:
          files: docker/docker-compose.prod.yml
          targets: |
            api
            web
            backup
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          set: |
            *.cache-from=type=gha
            *.cache-to=type=gha,mode=max
            api.tags=ghcr.io/anxchywl/loci-api:latest
            web.tags=ghcr.io/anxchywl/loci-web:latest
            backup.tags=ghcr.io/anxchywl/loci-backup:latest

  deploy:
    name: Deploy
    needs: [lint-and-test, migration-safety, docker-build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Deploy to production server
        uses: appleboy/ssh-action@v1.2.0
        env:
          ENV_FILE_CONTENT: ${{ secrets.ENV_FILE }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: ENV_FILE_CONTENT
          script: |
            set -euo pipefail
            REPO="${{ secrets.SSH_PATH }}"
            if [ ! -d "$REPO/.git" ]; then
              mkdir -p "$(dirname "$REPO")"
              git clone https://github.com/anxchywl/loci.git "$REPO"
            fi
            cd "$REPO"
            git fetch origin main
            git checkout main
            git fetch origin main
            git reset --hard origin/main
            echo "$ENV_FILE_CONTENT" > .env
            chmod 600 .env
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
            DEPLOYMENT_TARGET=shared-host DEPLOY_USE_PREBUILT=true deploy/deploy.sh
