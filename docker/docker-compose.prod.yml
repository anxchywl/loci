name: loci

x-backend-env: &backend-env
  APP_ENV: production
  LOG_LEVEL: ${LOG_LEVEL:-INFO}
  API_V1_PREFIX: ${API_V1_PREFIX:-/api/v1}
  TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:?TELEGRAM_BOT_TOKEN must be set}
  TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME:-}
  TELEGRAM_MINI_APP_URL: ${TELEGRAM_MINI_APP_URL:-}
  TELEGRAM_INIT_DATA_MAX_AGE_SECONDS: ${TELEGRAM_INIT_DATA_MAX_AGE_SECONDS:-300}
  JWT_SECRET_KEY: ${JWT_SECRET_KEY:?JWT_SECRET_KEY must be set}
  JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
  ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-15}
  REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-30}
  AUTH_REQUESTS_PER_MINUTE: ${AUTH_REQUESTS_PER_MINUTE:-10}
  STORY_CREATE_PER_DAY: ${STORY_CREATE_PER_DAY:-10}
  LOCATION_FUZZ_SECRET: ${LOCATION_FUZZ_SECRET:?LOCATION_FUZZ_SECRET must be set}
  DATABASE_URL: ${DATABASE_URL:-}
  POSTGRES_HOST: postgres
  POSTGRES_PORT: 5432
  POSTGRES_DB: ${POSTGRES_DB:-loci}
  POSTGRES_USER: ${POSTGRES_USER:-loci}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
  DB_POOL_SIZE: ${DB_POOL_SIZE:-5}
  DB_MAX_OVERFLOW: ${DB_MAX_OVERFLOW:-3}
  DB_POOL_TIMEOUT_SECONDS: ${DB_POOL_TIMEOUT_SECONDS:-10}
  DB_STATEMENT_TIMEOUT_MS: ${DB_STATEMENT_TIMEOUT_MS:-30000}
  REDIS_HOST: redis
  REDIS_PORT: 6379
  REDIS_DB: ${REDIS_DB:-0}
  REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD must be set}
  REDIS_URL: ${REDIS_URL:-}
  CELERY_BROKER_URL: ${CELERY_BROKER_URL:-}
  CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-}
  S3_ENDPOINT: ${S3_ENDPOINT:?S3_ENDPOINT must be set}
  S3_PUBLIC_ENDPOINT: ${S3_PUBLIC_ENDPOINT:?S3_PUBLIC_ENDPOINT must be set}
  S3_ACCESS_KEY: ${S3_ACCESS_KEY:?S3_ACCESS_KEY must be set}
  S3_SECRET_KEY: ${S3_SECRET_KEY:?S3_SECRET_KEY must be set}
  S3_SECURE: ${S3_SECURE:-true}
  S3_MEDIA_BUCKET: ${S3_MEDIA_BUCKET:-loci-media}
  S3_PRESIGNED_URL_EXPIRES_SECONDS: ${S3_PRESIGNED_URL_EXPIRES_SECONDS:-600}
  ALLOWED_ORIGINS: "${ALLOWED_ORIGINS:?ALLOWED_ORIGINS must be set}"
  ADMIN_TELEGRAM_IDS: ${ADMIN_TELEGRAM_IDS:-}
  TRUST_PROXY_HEADERS: "true"

services:

  caddy:
    image: caddy:2.10.2-alpine
    profiles: [dedicated]
    environment:
      CADDY_DOMAIN: ${CADDY_DOMAIN:?CADDY_DOMAIN must be set}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    mem_limit: 128m
    pids_limit: 128
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_healthy
    networks:
      - loci-app

  web:
    image: ghcr.io/${REGISTRY_OWNER:-anxchywl}/loci-web:latest
    build:
      context: ..
      dockerfile: docker/frontend.Dockerfile
      args:
        NEXT_PUBLIC_API_URL: /api/v1
        NEXT_PUBLIC_TELEGRAM_BOT_USERNAME: ${NEXT_PUBLIC_TELEGRAM_BOT_USERNAME:-}
    init: true
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:mode=1777
      - /app/.next/cache:uid=10001,gid=10001
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: 480m
    pids_limit: 256
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - fetch('http://127.0.0.1:3000').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - loci-app

  api:
    image: ghcr.io/${REGISTRY_OWNER:-anxchywl}/loci-api:latest
    build:
      context: ..
      dockerfile: docker/backend.production.Dockerfile
    init: true
    environment:
      <<: *backend-env
      WEB_CONCURRENCY: ${WEB_CONCURRENCY:-3}
      PROMETHEUS_MULTIPROC_DIR: /tmp/prometheus
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:mode=1777
    volumes:
      - type: bind
        source: ${BACKUP_DIR:-/opt/loci/backups}
        target: /backups
        read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: 1g
    pids_limit: 256
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - loci-app
      - loci-data

  worker:
    image: ghcr.io/${REGISTRY_OWNER:-anxchywl}/loci-api:latest
    build:
      context: ..
      dockerfile: docker/backend.production.Dockerfile
    init: true
    command: celery -A app.workers.celery_app worker --loglevel=INFO --concurrency=2 -Q images
    environment: *backend-env
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: 768m
    pids_limit: 256
    stop_grace_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - loci-data

  worker-events:
    image: ghcr.io/${REGISTRY_OWNER:-anxchywl}/loci-api:latest
    build:
      context: ..
      dockerfile: docker/backend.production.Dockerfile
    init: true
    command: celery -A app.workers.celery_app worker --loglevel=INFO --concurrency=1 -Q notifications,maintenance
    environment: *backend-env
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: 256m
    pids_limit: 128
    stop_grace_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - loci-data

  beat:
    image: ghcr.io/${REGISTRY_OWNER:-anxchywl}/loci-api:latest
    build:
      context: ..
      dockerfile: docker/backend.production.Dockerfile
    init: true
    command: celery -A app.workers.celery_app beat --loglevel=INFO --schedule=/tmp/celerybeat-schedule
    environment: *backend-env
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: 128m
    pids_limit: 64
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - loci-data

  bot:
    image: ghcr.io/${REGISTRY_OWNER:-anxchywl}/loci-api:latest
    build:
      context: ..
      dockerfile: docker/backend.production.Dockerfile
    init: true
    command: python -m app.workers.bot
    environment: *backend-env
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: 256m
    pids_limit: 128
    networks:
      - loci-data

  postgres:
    image: postgis/postgis:16-3.4
    command:
      - postgres
      - -c
      - shared_preload_libraries=pg_stat_statements
      - -c
      - pg_stat_statements.track=all
      - -c
      - max_connections=60
      - -c
      - shared_buffers=2GB
      - -c
      - effective_cache_size=5GB
      - -c
      - maintenance_work_mem=128MB
      - -c
      - work_mem=4MB
      - -c
      - random_page_cost=1.1
      - -c
      - effective_io_concurrency=200
      - -c
      - checkpoint_completion_target=0.9
      - -c
      - min_wal_size=1GB
      - -c
      - max_wal_size=4GB
      - -c
      - wal_compression=on
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-loci}
      POSTGRES_USER: ${POSTGRES_USER:-loci}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_INITDB_ARGS: --data-checksums
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    shm_size: 256m
    mem_limit: 3g
    pids_limit: 256
    stop_grace_period: 60s
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-loci} -d ${POSTGRES_DB:-loci}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - loci-data

  prometheus:
    image: prom/prometheus:v3.7.3
    profiles: [monitoring]
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=14d
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:mode=1777
    mem_limit: 192m
    pids_limit: 128
    depends_on:
      api:
        condition: service_healthy
    networks:
      - loci-app

  grafana:
    image: grafana/grafana:12.3.1
    profiles: [monitoring]
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_HTTP_ADDR: 0.0.0.0
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:mode=1777
    mem_limit: 160m
    pids_limit: 128
    depends_on:
      - prometheus
    ports:
      - "127.0.0.1:${GRAFANA_PORT:-3001}:3000"
    networks:
      - loci-app

  node-exporter:
    image: quay.io/prometheus/node-exporter:v1.11.1
    profiles: [monitoring]
    command:
      - --path.rootfs=/host
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
    volumes:
      - /:/host:ro,rslave
    pid: host
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: 64m
    pids_limit: 64
    networks:
      - loci-app

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.55.1
    profiles: [monitoring]
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk:/dev/disk:ro
    restart: unless-stopped
    privileged: true
    devices:
      - /dev/kmsg
    mem_limit: 128m
    pids_limit: 128
    networks:
      - loci-app

  redis:
    image: redis:7-alpine
    command:
      - redis-server
      - --requirepass
      - ${REDIS_PASSWORD:?REDIS_PASSWORD must be set}
      - --appendonly
      - "yes"
      - --appendfsync
      - everysec
      - --maxmemory
      - 384mb
      - --maxmemory-policy
      - noeviction
    volumes:
      - redis-data:/data
    restart: unless-stopped
    mem_limit: 512m
    pids_limit: 128
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD} ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - loci-data

  backup:
    image: ghcr.io/${REGISTRY_OWNER:-anxchywl}/loci-backup:latest
    build:
      context: ..
      dockerfile: docker/backup.Dockerfile
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: ${POSTGRES_DB:-loci}
      POSTGRES_USER: ${POSTGRES_USER:-loci}
      PGPASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-14}
      BACKUP_MAX_AGE_HOURS: ${BACKUP_MAX_AGE_HOURS:-26}
      BACKUP_S3_ENDPOINT: ${BACKUP_S3_ENDPOINT:-}
      BACKUP_S3_BUCKET: ${BACKUP_S3_BUCKET:-}
      BACKUP_AGE_RECIPIENT: ${BACKUP_AGE_RECIPIENT:-}
      AWS_ACCESS_KEY_ID: ${BACKUP_S3_ACCESS_KEY:-}
      AWS_SECRET_ACCESS_KEY: ${BACKUP_S3_SECRET_KEY:-}
      AWS_DEFAULT_REGION: auto
    volumes:
      - ${BACKUP_DIR:-/opt/loci/backups}:/backups
    restart: unless-stopped
    mem_limit: 256m
    pids_limit: 128
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - loci-data

volumes:
  caddy-data:
  caddy-config:
  postgres-data:
  redis-data:
  prometheus-data:
  grafana-data:

networks:
  loci-app:
  loci-data:
